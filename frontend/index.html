<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zibblefrog Agent Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    input { width: 70%; padding: 8px; font-size: 1rem; }
    button { padding: 8px 16px; font-size: 1rem; cursor: pointer; }
    #results { margin-top: 20px; }
    .step { background: #f4f4f4; border-left: 4px solid #4CAF50; padding: 10px; margin: 8px 0; }
    .step h4 { margin: 0 0 4px 0; color: #333; }
    .step p { margin: 0; color: #555; }
    #loading { display: none; color: #888; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>🐸 Zibblefrog Agent Orchestration Demo</h1>
  <p>Enter a goal and watch the planner + executor agents work together!</p>
  <input id="goal" type="text" placeholder="e.g. Plan a trip to Paris" />
  <button onclick="runAgent()">Run</button>
  <div id="loading">⏳ Agents are working...</div>
  <div id="results"></div>

  <script>
    const API = 'https://zibblefrog-agent.onrender.com';

    async function runAgent() {
      const goal = document.getElementById('goal').value;
      if (!goal) return;
      document.getElementById('loading').style.display = 'block';
      document.getElementById('results').innerHTML = '';
      const res = await fetch(`${API}/run?goal=${encodeURIComponent(goal)}`, {method: 'POST'});
      const data = await res.json();
      document.getElementById('loading').style.display = 'none';
      const html = data.steps.map(s => `
        <div class="step">
          <h4>📋 ${s.step}</h4>
          <p>${s.result}</p>
        </div>`).join('');
      document.getElementById('results').innerHTML = `<h2>Goal: ${data.goal}</h2>` + html;
    }
  </script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>

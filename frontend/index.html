<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zibblefrog Agent Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; max-width: 860px; margin: 40px auto; padding: 0 24px; background: #0a0a0f; color: #f0f0f0; }
    h1 { color: #00F5FF; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 28px; font-size: 0.95rem; }

    .input-row { display: flex; gap: 10px; }
    input { flex: 1; padding: 10px 14px; font-size: 1rem; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px; }
    input:focus { outline: none; border-color: #00F5FF; }
    button#run-btn { padding: 10px 22px; font-size: 1rem; cursor: pointer; background: #00F5FF; color: #000; border: none; border-radius: 6px; font-weight: 700; transition: opacity 0.2s; }
    button#run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Progress bar */
    #progress-wrap { margin-top: 20px; background: #1a1a2e; border-radius: 20px; height: 6px; display: none; }
    #progress-bar { height: 6px; background: #00F5FF; border-radius: 20px; width: 0%; transition: width 0.4s; }

    /* Status */
    #status { margin-top: 12px; font-size: 0.9rem; color: #555; min-height: 20px; display: flex; align-items: center; gap: 8px; }
    .dots span { animation: blink 1.2s infinite; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

    /* Results */
    #results { margin-top: 24px; }

    /* Planner card */
    .planner-card { background: #0d1117; border: 1px solid #00F5FF33; border-left: 4px solid #00F5FF; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; user-select: none; }
    .card-header h4 { color: #00F5FF; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
    .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .badge.thinking { background: #333; color: #aaa; }
    .badge.streaming { background: #003d40; color: #00F5FF; }
    .badge.done { background: #003d20; color: #00ff88; }
    .card-body { padding: 0 16px 14px; color: #aaa; font-size: 0.9rem; white-space: pre-wrap; line-height: 1.6; }
    .collapse-icon { color: #555; font-size: 0.8rem; transition: transform 0.2s; }
    .collapsed .collapse-icon { transform: rotate(-90deg); }
    .collapsed .card-body { display: none; }

    /* Step cards */
    .step-card { background: #0a0a0f; border: 1px solid #1a1a2e; border-radius: 8px; margin: 8px 0 8px 20px; overflow: hidden; transition: border-color 0.2s; }
    .step-card.active { border-color: #00F5FF55; }
    .step-card .card-header h4 { color: #fff; font-size: 0.85rem; text-transform: none; letter-spacing: 0; }
    .step-card .card-body { color: #888; }

    /* Copy button */
    .copy-btn { font-size: 0.75rem; padding: 3px 10px; background: #1a1a2e; border: 1px solid #333; color: #aaa; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
    .copy-btn:hover { background: #222; color: #fff; }
    .copy-btn.copied { color: #00ff88; border-color: #00ff88; }
  </style>
</head>
<body>
  <h1>🐸 Zibblefrog Agent Demo</h1>
  <p class="subtitle">Enter a goal and watch the planner + executor agents work in real-time.</p>

  <div class="input-row">
    <input id="goal" type="text" placeholder="e.g. Plan a trip to Paris for 7 days" />
    <button id="run-btn" onclick="runAgent()">▶ Run</button>
  </div>

  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="status"></div>
  <div id="results"></div>

  <script>
    const API = 'https://zibblefrog-agent.onrender.com';
    let plannerEl = null, currentStepEl = null, totalSteps = 0, doneSteps = 0;

    function setStatus(msg, animate=false) {
      const s = document.getElementById('status');
      s.innerHTML = animate
        ? `${msg} <span class="dots"><span>.</span><span>.</span><span>.</span></span>`
        : msg;
    }

    function setProgress(pct) {
      document.getElementById('progress-wrap').style.display = 'block';
      document.getElementById('progress-bar').style.width = pct + '%';
    }

    function makeCopyBtn(getTextFn) {
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.onclick = () => {
        navigator.clipboard.writeText(getTextFn());
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      };
      return btn;
    }

    function makeCollapsible(card) {
      const header = card.querySelector('.card-header');
      header.onclick = () => card.classList.toggle('collapsed');
    }

    function runAgent() {
      const goal = document.getElementById('goal').value.trim();
      if (!goal) return;
      document.getElementById('results').innerHTML = '';
      document.getElementById('run-btn').disabled = true;
      plannerEl = null; currentStepEl = null; totalSteps = 0; doneSteps = 0;
      setProgress(5);
      setStatus('Connecting to agents', true);

      const es = new EventSource(`${API}/stream?goal=${encodeURIComponent(goal)}`);

      es.onmessage = (e) => {
        const data = JSON.parse(e.data);
        const results = document.getElementById('results');

        if (data.agent === 'planner' && data.status === 'thinking') {
          plannerEl = document.createElement('div');
          plannerEl.className = 'planner-card';
          plannerEl.innerHTML = `
            <div class="card-header">
              <h4>🧠

 Planner <span class="badge thinking">thinking</span></h4>
              <span class="collapse-icon">▼</span>
            </div>
            <div class="card-body"></div>`;
          results.appendChild(plannerEl);
          makeCollapsible(plannerEl);
          setStatus('Planner is thinking', true);
          setProgress(10);
        }
        else if (data.agent === 'planner' && data.status === 'streaming') {
          plannerEl.querySelector('.badge').className = 'badge streaming';
          plannerEl.querySelector('.badge').textContent = 'streaming';
          plannerEl.querySelector('.card-body').textContent += data.content;
        }
        else if (data.agent === 'planner' && data.status === 'done') {
          plannerEl.querySelector('.badge').className = 'badge done';
          plannerEl.querySelector('.badge').textContent = 'done';
          const hdr = plannerEl.querySelector('.card-header');
          hdr.appendChild(makeCopyBtn(() => plannerEl.querySelector('.card-body').textContent));
          totalSteps = data.steps.length;
          setProgress(20);
        }
        else if (data.agent === 'executor' && data.status === 'thinking') {
          currentStepEl = document.createElement('div');
          currentStepEl.className = 'step-card active';
          currentStepEl.innerHTML = `
            <div class="card-header">
              <h4>📋 ${data.step} <span class="badge thinking">thinking</span></h4>
              <span class="collapse-icon">▼</span>
            </div>
            <div class="card-body"></div>`;
          results.appendChild(currentStepEl);
          makeCollapsible(currentStepEl);
          setStatus(`Executing step ${doneSteps + 1} of ${totalSteps}`, true);
        }
        else if (data.agent === 'executor' && data.status === 'streaming') {
          currentStepEl.querySelector('.badge').className = 'badge streaming';
          currentStepEl.querySelector('.badge').textContent = 'streaming';
          currentStepEl.querySelector('.card-body').textContent += data.content;
        }
        else if (data.agent === 'executor' && data.status === 'done') {
          currentStepEl.classList.remove('active');
          currentStepEl.querySelector('.badge').className = 'badge done';
          currentStepEl.querySelector('.badge').textContent = 'done';
          const hdr = currentStepEl.querySelector('.card-header');
          const body = currentStepEl.querySelector('.card-body');
          hdr.appendChild(makeCopyBtn(() => body.textContent));
          doneSteps++;
          setProgress(20 + Math.round((doneSteps / totalSteps) * 80));
        }
        else if (data.agent === 'done') {
          setProgress(100);
          setStatus('✅ All agents completed!');
          document.getElementById('run-btn').disabled = false;
          es.close();
        }
      };

      es.onerror = () => {
        setStatus('❌ Connection error. Is the backend running?');
        document.getElementById('run-btn').disabled = false;
        es.close();
      };
    }

    document.getElementById('goal').addEventListener('keydown', e => {
      if (e.key === 'Enter') runAgent();
    });
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
